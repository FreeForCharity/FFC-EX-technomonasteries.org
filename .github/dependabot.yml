# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Keep npm dependencies up to date
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00' # UTC timezone (all times in dependabot.yml use UTC)
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'npm'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      # Keep TypeScript on 6.0.x patch releases only. 7.x (the native/Go port)
      # breaks `next build` on the pinned Next.js, and 6.1.x would violate the
      # @typescript-eslint peer range (typescript >=4.8.4 <6.1.0). Widen this
      # deliberately once the toolchain supports a newer range.
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
          - 'version-update:semver-minor'
    groups:
      # Group all npm production dependencies together
      # Note: Major version updates are excluded and handled individually
      # to allow careful review of potentially breaking changes
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      # Group all npm development dependencies together
      # Note: Major version updates are excluded and handled individually
      # to allow careful review of potentially breaking changes
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  # Keep GitHub Actions up to date
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00' # UTC timezone (all times in dependabot.yml use UTC)
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
